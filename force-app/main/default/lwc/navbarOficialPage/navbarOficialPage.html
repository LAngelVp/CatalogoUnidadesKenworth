<template>
  <nav class="containerNavbar">
    <img src={logoUrl} alt="Logo Kenworth" class="logo" onclick={selectInicio}>

    <!-- Hamburger menu para móviles -->
    <div class="hamburger-menu" onclick={toggleMobileMenu}>
        <lightning-icon icon-name={hamburgerIcon} size="medium" class="hamburger-icon"></lightning-icon>
    </div>

    <div class={mobileMenuClass}>
      <p class={tabClass.inicio} onclick={selectInicio}>Inicio</p>
      <p class={tabClass.servicio} onclick={selectServicio}>Servicio</p>
      <p class={tabClass.refacciones} onclick={selectRefacciones}>Refacciones</p>
      <p class={tabClass.unidades} onclick={selectUnidades}>Unidades</p>
      <p class={tabClass.sucursales} onclick={selectSucursales}>Sucursales</p>
      <p class={tabClass.empresa} onclick={selectEmpresa}>Empresa</p>
      <p class={tabClass.quejasSugerencias} onclick={selectQuejasSugerencias}>Quejas y Sugerencias</p>
      <p class={tabClass.trabajaConNosotros} onclick={selectTrabajaConNosotros}>Trabaja con Nosotros</p>
      <p class="nav-link contact-btn" onclick={openContactModal}>Contacto</p>
    </div>
  </nav>
  <template if:true={isModalOpen}>
    <div class="modal-overlay" onclick={closeModalOnOverlay}>
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="textMayus">Contacto Kenworth DAF del Este</h2>
                <button class="modal-close" onclick={closeContactModal}>&times;</button>
            </div>
            <div class="modal-body">
                <c-page-oficial-contact-form></c-page-oficial-contact-form>
            </div>
        </div>
    </div>
  </template>
</template>

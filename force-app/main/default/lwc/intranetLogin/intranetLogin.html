<template>
    <div class="login-container">
        <div class="login-card">
            <!-- Brand Logo -->
            <div class="logo-section">
                <img src={logoUrl} alt="Kenworth Logo" class="brand-logo">
            </div>

            <div class="header-section">
                <h1>Intranet Kenworth</h1>
                <p>Bienvenido. Por favor inicia sesión.</p>
            </div>

            <!-- Error Message -->
            <template lwc:if={error}>
                <div class="error-banner">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                    <span>{error}</span>
                </div>
            </template>

            <!-- Login Form -->
            <div class="form-section">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <lightning-input 
                        type="email" 
                        label="Correo electrónico"
                        variant="label-hidden"
                        id="email"
                        placeholder="ejemplo@kenworth.com"
                        value={email}
                        onchange={handleEmailChange}
                        required>
                    </lightning-input>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <lightning-input 
                        type="password"
                        label="Contraseña"
                        variant="label-hidden"
                        id="password"
                        placeholder="••••••••"
                        value={password}
                        onchange={handlePasswordChange}
                        required>
                    </lightning-input>
                </div>

                <div class="action-group">
                    <button class="login-button" onclick={handleSubmit} disabled={loading}>
                        <template lwc:if={loading}>
                            <div class="spinner-container">
                                <lightning-spinner alternative-text="Cargando" size="small" variant="inverse"></lightning-spinner>
                            </div>
                        </template>
                        <template lwc:else>
                            Iniciar Sesión
                        </template>
                    </button>
                </div>
            </div>

            <div class="footer-links">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
</template>
